---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - helm.toolkit.fluxcd.io
  resources:
  - helmreleases
  verbs:
  - patch
- apiGroups:
  - kustomize.toolkit.fluxcd.io
  resources:
  - kustomizations
  verbs:
  - patch
- apiGroups:
  - milestone.as-code.io
  resources:
  - clustermilestones
  - milestones
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - milestone.as-code.io
  resources:
  - clustermilestones/finalizers
  - milestones/finalizers
  verbs:
  - update
- apiGroups:
  - milestone.as-code.io
  resources:
  - clustermilestones/status
  - milestones/status
  verbs:
  - get
  - patch
  - update
