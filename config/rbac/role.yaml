---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - as-code.io
  resources:
  - clusterechelons
  - echelons
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - as-code.io
  resources:
  - clusterechelons/finalizers
  - echelons/finalizers
  verbs:
  - update
- apiGroups:
  - as-code.io
  resources:
  - clusterechelons/status
  - echelons/status
  verbs:
  - get
  - patch
  - update
