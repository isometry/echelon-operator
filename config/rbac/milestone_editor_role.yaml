# This rule is not used by the project milestone-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within milestone.as-code.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: milestone-operator
    app.kubernetes.io/managed-by: kustomize
  name: milestone-editor-role
rules:
- apiGroups:
  - milestone.as-code.io
  resources:
  - milestones
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - milestone.as-code.io
  resources:
  - milestones/status
  verbs:
  - get
