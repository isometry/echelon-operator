# This rule is not used by the project echelon-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the as-code.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: echelon-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterechelon-editor-role
rules:
- apiGroups:
  - as-code.io
  resources:
  - clusterechelons
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - as-code.io
  resources:
  - clusterechelons/status
  verbs:
  - get
