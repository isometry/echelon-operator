# Sample ClusterRole granting the operator's dynamic informers list/watch
# access to common GitOps resource kinds. Bound separately so cluster
# administrators can replace it with a narrower role for restricted
# environments.
#
# Rule of thumb: every group/kind that may appear under spec.members.<name>.group/kind
# must be reachable by these rules. Add or remove groups to suit your
# deployment.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-dynamic-watch-role
  labels:
    app.kubernetes.io/name: echelon-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
      - helm.toolkit.fluxcd.io
      - source.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
      - image.toolkit.fluxcd.io
    resources: ["*"]
    verbs: [get, list, watch]
  # Add additional groups (e.g. argoproj.io, cert-manager.io) as needed.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-dynamic-watch-rolebinding
  labels:
    app.kubernetes.io/name: echelon-operator
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-dynamic-watch-role
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: system
