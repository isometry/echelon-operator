# This rule is not used by the project milestone-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to milestone.as-code.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: milestone-operator
    app.kubernetes.io/managed-by: kustomize
  name: milestone-viewer-role
rules:
- apiGroups:
  - milestone.as-code.io
  resources:
  - milestones
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - milestone.as-code.io
  resources:
  - milestones/status
  verbs:
  - get
