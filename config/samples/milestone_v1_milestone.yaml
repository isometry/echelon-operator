apiVersion: milestone.as-code.io/v1
kind: Milestone
metadata:
  name: wave-0
  namespace: flux-system
  labels:
    app.kubernetes.io/name: milestone-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  dependsOn:
    - name: kustomizations
      emptySetPolicy: NotReady
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        selector:
          matchLabels:
            wave: "0"
    - name: helmreleases
      emptySetPolicy: Unknown
      target:
        group: helm.toolkit.fluxcd.io
        kind: HelmRelease
        selector:
          matchLabels:
            wave: "0"
